name: Spot Healing Cloud Runner

on:
  repository_dispatch:
    types: [heal_video]

jobs:
  render-spot-healing:
    runs-on: ubuntu-24.04 # Pinning to Ubuntu 24.04 for stable FFmpeg/Python environments

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        # We need to checkout the repo so the runner has access to runner.py

      - name: ⚙️ Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg unzip wget
          python -m pip install --upgrade pip
          # Add any PyTorch or specific AI libraries your model needs here
          pip install opencv-python-headless numpy huggingface_hub

      - name: 📥 Download Payload (Public Read)
        run: |
          echo "Starting Job ID: ${{ github.event.client_payload.job_id }}"
          # Download the zip directly from your public Hugging Face bucket
          wget -O payload.zip "${{ github.event.client_payload.zip_url }}"
          
          # Extract into a clean workspace
          unzip payload.zip -d workspace/
          
          # Move the runner script into the workspace so it can access the files
          cp runner.py workspace/

      - name: 🧠 Execute Render Pipeline
        run: |
          cd workspace
          python runner.py

      - name: 📤 Secure Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Upload the final video back to nookaharsha/temp
          huggingface-cli upload \
            nookaharsha/temp \
            workspace/final_healed.mp4 \
            ${{ github.event.client_payload.job_id }}/final_healed.mp4 \
            --repo-type dataset \
            --token $HF_TOKEN
            
      - name: 🧹 Bucket Cleanup
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Delete the massive payload.zip from the bucket to keep storage clean
          huggingface-cli delete-file \
            ${{ github.event.client_payload.job_id }}.zip \
            --repo-id nookaharsha/temp \
            --repo-type dataset \
            --token $HF_TOKEN
