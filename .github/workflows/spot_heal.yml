name: Spot Healing Cloud Runner

on:
  repository_dispatch:
    types: [heal_video]

jobs:
  render-spot-healing:
    runs-on: ubuntu-24.04

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg unzip wget git git-lfs
          python -m pip install --upgrade pip

      - name: 🧠 Install AI Dependencies (CPU Optimized)
        run: |
          # Install CPU-only PyTorch to save massive amounts of time and space
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install opencv-python-headless numpy huggingface_hub scipy tqdm imageio einops
          
      - name: 📥 Clone ProPainter & Weights
        run: |
          git clone https://github.com/sczhou/ProPainter.git
          cd ProPainter
          mkdir -p weights
          # Fix: Replaced deprecated huggingface-cli with 'hf download'
          hf download sczhou/ProPainter --local-dir weights

      - name: 📥 Download User Payload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Starting Job ID: ${{ github.event.client_payload.job_id }}"
          # Fix: Natively download from the bucket using the hf:// scheme
          hf buckets cp "${{ github.event.client_payload.zip_url }}" payload.zip
          unzip payload.zip -d workspace/
          cp runner.py workspace/

      - name: 🎬 Execute ProPainter Pipeline
        run: |
          cd workspace
          python runner.py

      - name: 📤 Secure Upload Final Video
        env:
          # hf CLI automatically detects this environment variable
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Fix: Natively upload the final render back into the bucket
          hf buckets cp \
            workspace/final_healed.mp4 \
            hf://buckets/nookaharsha/temp/${{ github.event.client_payload.job_id }}/final_healed.mp4
            
      - name: 🧹 Cleanup Staging Payload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Fix: Natively delete the massive zip file from the bucket to save space
          hf buckets rm \
            hf://buckets/nookaharsha/temp/${{ github.event.client_payload.job_id }}.zip
